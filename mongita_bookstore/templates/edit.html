{% extends 'base.html' %}

{% block container %}
<section class="formPage">
  <div class="formCard">
    <p class="eyebrowText">Revise a record from the haunted shelves</p>

    <h1>Edit Book</h1>

    <p class="formIntro">
      Update the selected book below. The form is pre-filled with the current data from the Mongita books collection.
    </p>

    <form method="POST" action="{{ url_for('edit_post', id=book['id']) }}">
      <label for="title">Title</label>
      <input id="title" type="text" name="title" value="{{ book['title'] }}" required>

      <label for="author">Author</label>
      <input id="author" type="text" name="author" value="{{ book['author'] }}" required>

      <label for="isbn">ISBN</label>
      <input id="isbn" type="text" name="isbn" value="{{ book['isbn'] }}" required>

      <label for="price">Price</label>
      <input id="price" type="number" step="0.01" name="price" value="{{ book['price'] }}" required>

      <label for="categoryId">Category</label>
      <select id="categoryId" name="categoryId" required>
        {% for category in categories %}
          <option value="{{ category['id'] }}"
            {% if category['id'] == book['categoryId'] %}selected{% endif %}>
            {{ category['name'] }}
          </option>
        {% endfor %}
      </select>

      <label for="image">Image Filename</label>
      <input id="image" type="text" name="image" value="{{ book['image'] }}" required>

      <label for="readNow">Read Now</label>
      <select id="readNow" name="readNow" required>
        <option value="0" {% if book['readNow'] == 0 %}selected{% endif %}>
          0 - Not available
        </option>
        <option value="1" {% if book['readNow'] == 1 %}selected{% endif %}>
          1 - Available
        </option>
      </select>

      <div class="formButtons">
        <button type="submit" class="primaryButton">Save Changes</button>
        <a href="{{ url_for('read') }}" class="secondaryButton">Cancel</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
